      # Point-to-Point links
      - prefix: 10.254.0.0/24
        description: "Liens point-à-point"
        status: active
        vrf: PROD

    # ============================================================
    # ROUTE TARGETS
    # ============================================================
    route_targets:
      - name: "65000:100"
        description: "RT PROD import/export"
      - name: "65000:200"
        description: "RT DMZ import/export"
      - name: "65000:300"
        description: "RT BACKUP import/export"
      - name: "65000:400"
        description: "RT VOIP import/export"
      - name: "65000:999"
        description: "RT MGMT import/export"

    # ============================================================
    # ASNs
    # ============================================================
    asns:
      - asn: 65001
        description: "AS Paris DC1"
        rir: RFC6996
      - asn: 65002
        description: "AS Lyon DC2"
        rir: RFC6996
      - asn: 65003
        description: "AS Marseille DC3"
        rir: RFC6996
      - asn: 65100
        description: "AS Transit Provider"
        rir: RFC6996

    # ============================================================
    # TUNNEL / VPN (via provider network)
    # ============================================================
    tunnels:
      - name: VPN-PAR-LYO-01
        status: active
        encapsulation: ipsec-tunnel
        description: "Tunnel IPSec Paris-DC1 vers Lyon-DC2"

      - name: VPN-PAR-MRS-01
        status: active
        encapsulation: ipsec-tunnel
        description: "Tunnel IPSec Paris-DC1 vers Marseille-DC3"

      - name: VPN-LYO-MRS-01
        status: active
        encapsulation: ipsec-tunnel
        description: "Tunnel IPSec Lyon-DC2 vers Marseille-DC3"

      - name: GRE-PAR-LYO-01
        status: active
        encapsulation: gre
        description: "Tunnel GRE Paris-DC1 vers Lyon-DC2"

    # ============================================================
    # L2VPN (VXLAN/MPLS)
    # ============================================================
    l2vpns:
      - name: VXLAN-PROD
        type: vxlan
        identifier: 10200
        description: "VXLAN overlay production inter-DC"

      - name: VXLAN-DMZ
        type: vxlan
        identifier: 10210
        description: "VXLAN overlay DMZ inter-DC"

      - name: MPLS-L2-BACKUP
        type: mpls-evpn
        identifier: 500
        description: "MPLS EVPN circuit backup inter-DC"

    # ============================================================
    # IP ADDRESSES (loopbacks & management)
    # ============================================================
    ip_addresses:
      # Loopbacks
      - address: 10.255.0.1/32
        vrf: PROD
        status: active
        dns_name: lo0.par-core-rtr-01.infra.local
        description: "Loopback PAR-CORE-RTR-01"
        device: PAR-CORE-RTR-01

      - address: 10.255.0.2/32
        vrf: PROD
        status: active
        dns_name: lo0.par-core-rtr-02.infra.local
        description: "Loopback PAR-CORE-RTR-02"
        device: PAR-CORE-RTR-02

      - address: 10.255.0.3/32
        vrf: PROD
        status: active
        dns_name: lo0.par-spine-sw-01.infra.local
        description: "Loopback PAR-SPINE-SW-01"
        device: PAR-SPINE-SW-01

      - address: 10.255.0.4/32
        vrf: PROD
        status: active
        dns_name: lo0.par-spine-sw-02.infra.local
        description: "Loopback PAR-SPINE-SW-02"
        device: PAR-SPINE-SW-02

      - address: 10.255.0.10/32
        vrf: PROD
        status: active
        dns_name: lo0.lyo-edge-rtr-01.infra.local
        description: "Loopback LYO-EDGE-RTR-01"
        device: LYO-EDGE-RTR-01

      - address: 10.255.0.20/32
        vrf: PROD
        status: active
        dns_name: lo0.mrs-edge-rtr-01.infra.local
        description: "Loopback MRS-EDGE-RTR-01"
        device: MRS-EDGE-RTR-01

      # OOB Management
      - address: 172.16.10.1/24
        status: active
        dns_name: mgmt.par-core-rtr-01.infra.local
        description: "OOB MGMT PAR-CORE-RTR-01"
        device: PAR-CORE-RTR-01

      - address: 172.16.10.2/24
        status: active
        dns_name: mgmt.par-core-rtr-02.infra.local
        description: "OOB MGMT PAR-CORE-RTR-02"
        device: PAR-CORE-RTR-02

      - address: 172.16.10.3/24
        status: active
        dns_name: mgmt.par-fw-01.infra.local
        description: "OOB MGMT PAR-FW-01"
        device: PAR-FW-01

      - address: 172.16.20.1/24
        status: active
        dns_name: mgmt.lyo-edge-rtr-01.infra.local
        description: "OOB MGMT LYO-EDGE-RTR-01"
        device: LYO-EDGE-RTR-01

      - address: 172.16.30.1/24
        status: active
        dns_name: mgmt.mrs-edge-rtr-01.infra.local
        description: "OOB MGMT MRS-EDGE-RTR-01"
        device: MRS-EDGE-RTR-01

    # ============================================================
    # SERVICES
    # ============================================================
    services:
      - device: PAR-CORE-RTR-01
        name: BGP
        protocol: tcp
        ports: [179]
        description: "BGP peering"

      - device: PAR-CORE-RTR-01
        name: SNMP
        protocol: udp
        ports: [161]
        description: "Monitoring SNMP"

      - device: PAR-FW-01
        name: HTTPS-MGMT
        protocol: tcp
        ports: [443]
        description: "Interface d'administration"

      - device: PAR-LB-01
        name: HTTPS
        protocol: tcp
        ports: [443, 80]
        description: "Load balancing HTTP/S"

      - device: LYO-EDGE-RTR-01
        name: BGP
        protocol: tcp
        ports: [179]
        description: "BGP peering Lyon"

  # ============================================================
  # TASKS
  # ============================================================
  tasks:

    - name: Créer les regions
      netbox.netbox.netbox_region:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          parent_region: "{{ item.parent | default(omit) }}"
        state: present
      loop: "{{ regions }}"

    - name: Créer les site groups
      netbox.netbox.netbox_site_group:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
        state: present
      loop: "{{ site_groups }}"

    - name: Créer les manufacturers
      netbox.netbox.netbox_manufacturer:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.manufacturer }}"
        state: present
      loop: "{{ manufacturers_and_devices }}"

    - name: Créer les device types
      netbox.netbox.netbox_device_type:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          manufacturer: "{{ item.0.manufacturer }}"
          model: "{{ item.1.model }}"
          slug: "{{ item.1.slug }}"
          u_height: "{{ item.1.u_height }}"
          is_full_depth: "{{ item.1.is_full_depth }}"
        state: present
      loop: "{{ manufacturers_and_devices | subelements('device_types') }}"

    - name: Créer les sites
      netbox.netbox.netbox_site:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          status: "{{ item.status }}"
          region: "{{ item.region }}"
          site_group: "{{ item.group }}"
          description: "{{ item.description }}"
          physical_address: "{{ item.physical_address }}"
          time_zone: "{{ item.time_zone }}"
        state: present
      loop: "{{ sites }}"

    - name: Créer les locations
      netbox.netbox.netbox_location:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          site: "{{ item.site }}"
        state: present
      loop: "{{ locations }}"

    - name: Créer les racks
      netbox.netbox.netbox_rack:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          site: "{{ item.site }}"
          location: "{{ item.location }}"
          status: "{{ item.status }}"
          u_height: "{{ item.u_height }}"
          width: "{{ item.width }}"
          serial: "{{ item.serial }}"
        state: present
      loop: "{{ racks }}"

    - name: Créer les device roles
      netbox.netbox.netbox_device_role:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          color: "{{ item.color }}"
          vm_role: "{{ item.vm_role }}"
        state: present
      loop: "{{ device_roles }}"

    - name: Créer les platforms
      netbox.netbox.netbox_platform:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          manufacturer: "{{ item.manufacturer | default(omit) }}"
          napalm_driver: "{{ item.napalm_driver | default(omit) }}"
        state: present
      loop: "{{ platforms }}"

    - name: Créer les VRFs
      netbox.netbox.netbox_vrf:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          rd: "{{ item.rd }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ vrfs }}"

    - name: Créer les route targets
      netbox.netbox.netbox_route_target:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ route_targets }}"

    - name: Créer le RIR
      netbox.netbox.netbox_rir:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "RFC6996"
          slug: "RFC6996"
          description: "RIR RFC 6996"
        state: present
      
    - name: Créer les ASNs
      netbox.netbox.netbox_asn:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          asn: "{{ item.asn }}"
          rir: "{{ item.rir }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ asns }}"

    - name: Créer les VLAN groups
      netbox.netbox.netbox_vlan_group:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          site: "{{ item.site }}"
        state: present
      loop: "{{ vlan_groups }}"

    - name: Créer les VLANs
      netbox.netbox.netbox_vlan:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          vid: "{{ item.vid }}"
          site: "{{ item.site }}"
          status: "{{ item.status }}"
          vrf: "{{ item.vrf | default(omit) }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ vlans }}"

    - name: Créer les prefixes sans VLAN ni site
      netbox.netbox.netbox_prefix:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          prefix: "{{ item.prefix }}"
          description: "{{ item.description }}"
          status: "{{ item.status }}"
          vrf: "{{ item.vrf | default(omit) }}"
        state: present
      loop: "{{ prefixes_containers }}"

    - name: Créer les prefixes actifs sans VLAN
      netbox.netbox.netbox_prefix:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          prefix: "{{ item.prefix }}"
          description: "{{ item.description }}"
          status: "{{ item.status }}"
          site: "{{ item.site | default(omit) }}"
          vrf: "{{ item.vrf | default(omit) }}"
        state: present
      loop: "{{ prefixes_active }}"
      when: item.vlan is not defined
      
    - name: Créer les prefixes actifs avec vlan
      netbox.netbox.netbox_prefix:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          prefix: "{{ item.prefix }}"
          description: "{{ item.description }}"
          status: "{{ item.status }}"
          site: "{{ item.site | default(omit) }}"
          vrf: "{{ item.vrf | default(omit) }}"
          vlan:
             vid: "{{ item.vlan }}"
             site: "{{ item.site }}"
        state: present
      loop: "{{ prefixes_active }}"
      when: item.vlan is defined

    - name: Créer les devices
      netbox.netbox.netbox_device:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          device_type: "{{ item.device_type }}"
          device_role: "{{ item.device_role }}"
          platform: "{{ item.platform }}"
          site: "{{ item.site }}"
          rack: "{{ item.rack }}"
          position: "{{ item.position }}"
          face: "{{ item.face }}"
          status: "{{ item.status }}"
          serial: "{{ item.serial }}"
        state: present
      loop: "{{ devices }}"

    - name: Créer les tunnels VPN
      netbox.netbox.netbox_tunnel:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          status: "{{ item.status }}"
          encapsulation: "{{ item.encapsulation }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ tunnels }}"

    - name: Créer les L2VPNs
      netbox.netbox.netbox_l2vpn:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ item.name }}"
          type: "{{ item.type }}"
          identifier: "{{ item.identifier }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ l2vpns }}"

    - name: Créer les adresses IP
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          address: "{{ item.address }}"
          vrf: "{{ item.vrf | default(omit) }}"
          status: "{{ item.status }}"
          dns_name: "{{ item.dns_name | default(omit) }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ ip_addresses }}"

    - name: Récupérer les IDs des devices pour les services
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/dcim/devices/?name={{ item.device }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
      register: device_lookup
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.device }}"
    
    - name: Créer les services via API REST (NetBox 4.3.7)
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/dcim/services/"
        method: POST
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ item.item.name }}"
          protocol: "{{ item.item.protocol }}"
          ports: "{{ item.item.ports }}"
          description: "{{ item.item.description }}"
          parent_object_type: "dcim.device"
          parent_object_id: "{{ item.json.results[0].id }}"
        status_code: [200, 201, 400, 404, 500]
        return_content: true
      register: service_result
      loop: "{{ device_lookup.results }}"
      loop_control:
        label: "{{ item.item.device }} - {{ item.item.name }}"
      ignore_errors: true

    - name: Afficher les erreurs de création de services
      ansible.builtin.debug:
        msg: "{{ item.content }}"
      loop: "{{ service_result.results }}"
      loop_control:
        label: "{{ item.item.item.name }}"
      when: item.status != 201
