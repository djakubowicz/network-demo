        device_types:
          - model: Catalyst 9300-24P
            slug: catalyst-9300-24p
            u_height: 1
            is_full_depth: true
          - model: Catalyst 9500-16X
            slug: catalyst-9500-16x
            u_height: 1
            is_full_depth: true
