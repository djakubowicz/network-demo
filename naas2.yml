---
- name: Network as Code - Infrastructure NetBox (mode full)
  vars_files: vars/main.yml
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    netbox_url: "{{ lookup('ansible.builtin.env', 'NETBOX_API') }}"
    netbox_token: "{{ lookup('ansible.builtin.env', 'NETBOX_TOKEN') }}"

    # ============================================================
    # REGIONS
    # ============================================================
    regions:
      - name: Europe
        slug: europe
      - name: France
        slug: france
